<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Customer Churn Predictor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; color: #333; }
    header { background: #1a73e8; color: white; padding: 20px 40px; }
    header h1 { font-size: 1.6rem; }
    header p { font-size: 0.9rem; opacity: 0.85; margin-top: 4px; }
    .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
    .card { background: white; border-radius: 12px; padding: 28px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .card h2 { font-size: 1.1rem; margin-bottom: 18px; color: #1a73e8; border-bottom: 2px solid #e8f0fe; padding-bottom: 8px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; margin-bottom: 5px; color: #555; }
    .field input, .field select {
      width: 100%; padding: 9px 12px; border: 1px solid #ddd;
      border-radius: 8px; font-size: 0.9rem; background: #fafafa;
      transition: border 0.2s;
    }
    .field input:focus, .field select:focus { border-color: #1a73e8; outline: none; background: white; }
    .btn {
      width: 100%; padding: 14px; background: #1a73e8; color: white;
      border: none; border-radius: 10px; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: background 0.2s;
    }
    .btn:hover { background: #1557b0; }
    .result { display: none; margin-top: 24px; border-radius: 12px; padding: 24px; text-align: center; }
    .result.churn { background: #fdecea; border: 2px solid #f44336; }
    .result.no-churn { background: #e6f4ea; border: 2px solid #34a853; }
    .result .icon { font-size: 2.5rem; margin-bottom: 10px; }
    .result h3 { font-size: 1.4rem; margin-bottom: 6px; }
    .result p { font-size: 0.95rem; color: #555; }
    .prob-bar-wrap { margin-top: 14px; background: #eee; border-radius: 20px; height: 14px; overflow: hidden; }
    .prob-bar { height: 100%; border-radius: 20px; transition: width 0.6s ease; }
    .churn .prob-bar { background: #f44336; }
    .no-churn .prob-bar { background: #34a853; }
    .prob-label { font-size: 0.85rem; margin-top: 6px; color: #666; }
    .error { display:none; background:#fff3cd; border:1px solid #ffc107; border-radius:8px; padding:12px; margin-top:16px; color:#856404; font-size:0.9rem; }
  </style>
</head>
<body>
<header>
  <h1>📊 Customer Churn Predictor</h1>
  <p>Telecom Customer Churn Prediction — Powered by Random Forest + SMOTEENN</p>
</header>
<div class="container">

  <div class="card">
    <h2>👤 Customer Demographics</h2>
    <div class="grid">
      <div class="field">
        <label>Gender</label>
        <select id="gender"><option>Male</option><option>Female</option></select>
      </div>
      <div class="field">
        <label>Senior Citizen</label>
        <select id="SeniorCitizen"><option value="0">No</option><option value="1">Yes</option></select>
      </div>
      <div class="field">
        <label>Partner</label>
        <select id="Partner"><option>No</option><option>Yes</option></select>
      </div>
      <div class="field">
        <label>Dependents</label>
        <select id="Dependents"><option>No</option><option>Yes</option></select>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>📞 Services</h2>
    <div class="grid">
      <div class="field">
        <label>Phone Service</label>
        <select id="PhoneService"><option>No</option><option>Yes</option></select>
      </div>
      <div class="field">
        <label>Multiple Lines</label>
        <select id="MultipleLines"><option>No phone service</option><option>No</option><option>Yes</option></select>
      </div>
      <div class="field">
        <label>Internet Service</label>
        <select id="InternetService"><option>DSL</option><option>Fiber optic</option><option>No</option></select>
      </div>
      <div class="field">
        <label>Online Security</label>
        <select id="OnlineSecurity"><option>No</option><option>Yes</option><option>No internet service</option></select>
      </div>
      <div class="field">
        <label>Online Backup</label>
        <select id="OnlineBackup"><option>No</option><option>Yes</option><option>No internet service</option></select>
      </div>
      <div class="field">
        <label>Device Protection</label>
        <select id="DeviceProtection"><option>No</option><option>Yes</option><option>No internet service</option></select>
      </div>
      <div class="field">
        <label>Tech Support</label>
        <select id="TechSupport"><option>No</option><option>Yes</option><option>No internet service</option></select>
      </div>
      <div class="field">
        <label>Streaming TV</label>
        <select id="StreamingTV"><option>No</option><option>Yes</option><option>No internet service</option></select>
      </div>
      <div class="field">
        <label>Streaming Movies</label>
        <select id="StreamingMovies"><option>No</option><option>Yes</option><option>No internet service</option></select>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>📄 Account & Billing</h2>
    <div class="grid">
      <div class="field">
        <label>Tenure Group</label>
        <select id="tenure_group">
          <option>1 - 12</option><option>13 - 24</option><option>25 - 36</option>
          <option>37 - 48</option><option>49 - 60</option><option>61 - 72</option>
        </select>
      </div>
      <div class="field">
        <label>Contract</label>
        <select id="Contract"><option>Month-to-month</option><option>One year</option><option>Two year</option></select>
      </div>
      <div class="field">
        <label>Paperless Billing</label>
        <select id="PaperlessBilling"><option>No</option><option>Yes</option></select>
      </div>
      <div class="field">
        <label>Payment Method</label>
        <select id="PaymentMethod">
          <option>Electronic check</option><option>Mailed check</option>
          <option>Bank transfer (automatic)</option><option>Credit card (automatic)</option>
        </select>
      </div>
      <div class="field">
        <label>Monthly Charges ($)</label>
        <input type="number" id="MonthlyCharges" value="64.76" step="0.01"/>
      </div>
      <div class="field">
        <label>Total Charges ($)</label>
        <input type="number" id="TotalCharges" value="500" step="0.01"/>
      </div>
    </div>
  </div>

  <button class="btn" onclick="predict()">🔍 Predict Churn</button>

  <div class="error" id="errorBox"></div>

  <div class="result" id="result">
    <div class="icon" id="resultIcon"></div>
    <h3 id="resultTitle"></h3>
    <p id="resultDesc"></p>
    <div class="prob-bar-wrap"><div class="prob-bar" id="probBar"></div></div>
    <p class="prob-label" id="probLabel"></p>
  </div>
</div>

<script>
async function predict() {
  const fields = ['gender','SeniorCitizen','Partner','Dependents','PhoneService',
    'MultipleLines','InternetService','OnlineSecurity','OnlineBackup','DeviceProtection',
    'TechSupport','StreamingTV','StreamingMovies','Contract','PaperlessBilling',
    'PaymentMethod','MonthlyCharges','TotalCharges','tenure_group'];

  const payload = {};
  fields.forEach(f => { payload[f] = document.getElementById(f).value; });

  document.getElementById('errorBox').style.display = 'none';
  document.getElementById('result').style.display = 'none';

  try {
    const res = await fetch('/predict', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    const box = document.getElementById('result');
    const isChurn = data.churn === 1;
    box.className = 'result ' + (isChurn ? 'churn' : 'no-churn');
    document.getElementById('resultIcon').textContent = isChurn ? '⚠️' : '✅';
    document.getElementById('resultTitle').textContent = isChurn ? 'This customer is likely to CHURN' : 'This customer is likely to STAY';
    document.getElementById('resultDesc').textContent = `Churn probability: ${data.churn_probability}%`;
    document.getElementById('probBar').style.width = data.churn_probability + '%';
    document.getElementById('probLabel').textContent = `${data.churn_probability}% chance of churning`;
    box.style.display = 'block';
  } catch(e) {
    const eb = document.getElementById('errorBox');
    eb.textContent = 'Error: ' + e.message;
    eb.style.display = 'block';
  }
}
</script>
</body>
</html>
